<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#3b82f6" />
      <stop offset="50%" stopColor="#06b6d4" />
      <stop offset="100%" stopColor="#6366f1" />
    </linearGradient>
    <linearGradient id="fav-accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#60a5fa" />
      <stop offset="100%" stopColor="#a78bfa" />
    </linearGradient>
  </defs>
  
  {/* A logo container */}
  <rect width="100" height="100" rx="22" fill="#050814" />
  
  {/* Left leg of A */}
  <path
    d="M 50 20 L 25 80 H 37 L 50 50 Z"
    fill="url(#fav-grad)"
  />
  
  {/* Right leg of A */}
  <path
    d="M 50 20 L 75 80 H 63 L 50 50 Z"
    fill="url(#fav-grad)"
    opacity="0.9"
  />
  
  {/* Tech crossbar */}
  <path
    d="M 41 58 L 59 58 L 55 52 L 45 52 Z"
    fill="url(#fav-accent)"
  />
  
  {/* Tech node points */}
  <circle cx="50" cy="20" r="4" fill="#60a5fa" />
  <circle cx="25" cy="80" r="3" fill="#3b82f6" />
  <circle cx="75" cy="80" r="3" fill="#6366f1" />
</svg>
